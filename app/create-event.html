<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <title>Создать мероприятие — Sharecar</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #fff; font-family: -apple-system, sans-serif; padding-bottom: 40px; }

    .top-bar { display: flex; align-items: center; gap: 12px; padding: 16px; border-bottom: 1px solid #1e1e3a; position: sticky; top: 0; background: #0f0f0f; z-index: 10; }
    .top-bar h1 { font-size: 18px; font-weight: 700; flex: 1; }
    .back-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 4px; }

    .form-wrap { padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }

    .form-section { background: #1a1a2e; border-radius: 16px; padding: 16px; }
    .form-section-title { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; font-weight: 600; }

    .form-group { margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { font-size: 13px; color: #aaa; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.2s; }
    .form-input:focus { border-color: #f59e0b; }
    .form-textarea { width: 100%; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 14px; outline: none; font-family: inherit; resize: none; min-height: 100px; transition: border-color 0.2s; }
    .form-textarea:focus { border-color: #f59e0b; }

    .type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .type-btn { background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 12px; padding: 10px 4px; cursor: pointer; text-align: center; transition: all 0.2s; }
    .type-btn .type-icon { font-size: 22px; display: block; margin-bottom: 4px; }
    .type-btn .type-label { font-size: 10px; color: #888; }
    .type-btn.active { background: #f59e0b20; border-color: #f59e0b; }
    .type-btn.active .type-label { color: #f59e0b; }

    .photos-upload-area { width:100%; min-height:100px; background:#0f0f1a; border:2px dashed #2a2a4a; border-radius:12px; padding:12px; cursor:pointer; transition:border-color 0.2s; }
    .photos-upload-area:active { border-color:#f59e0b; }
    .photos-upload-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:24px 0; }
    .photos-upload-placeholder i { font-size:32px; color:#555; }
    .photos-upload-placeholder span { font-size:13px; color:#555; }
    .photos-grid-preview { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .photo-thumb { position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; border:2px solid transparent; cursor:pointer; }
    .photo-thumb img { width:100%; height:100%; object-fit:cover; }
    .photo-thumb.is-cover { border-color:#f59e0b; }
    .photo-thumb .cover-badge { position:absolute; bottom:4px; left:4px; background:#f59e0b; color:#000; font-size:9px; font-weight:700; padding:2px 5px; border-radius:4px; }
    .photo-thumb .remove-photo { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.7); border:none; color:#fff; width:22px; height:22px; border-radius:50%; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; }
    .add-more-btn { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:10px; background:#1a1a2e; border:1px dashed #2a2a4a; border-radius:10px; padding:10px; color:#888; font-size:13px; cursor:pointer; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label { font-size: 14px; color: #ccc; }
    .toggle { width: 44px; height: 24px; background: #2a2a4a; border-radius: 12px; cursor: pointer; position: relative; transition: background 0.2s; border: none; }
    .toggle.on { background: #22c55e; }
    .toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle.on::after { transform: translateX(20px); }

    .tags-input-wrap { display: flex; gap: 8px; margin-bottom: 10px; }
    .tags-input { flex: 1; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; padding: 10px 14px; color: #fff; font-size: 14px; outline: none; }
    .tags-input:focus { border-color: #f59e0b; }
    .tag-add-btn { background: #f59e0b; color: #000; border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-weight: 700; font-size: 14px; }
    .tags-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-item { background: #1e1e3a; color: #f59e0b; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .tag-remove { background: none; border: none; color: #f59e0b; cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }

    .submit-btn { width: 100%; padding: 16px; background: #f59e0b; color: #000; border: none; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; transition: opacity 0.2s; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:active { opacity: 0.8; }
    .hint { font-size: 12px; color: #555; margin-top: 6px; }

    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e1e3a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; }
    #toast.error { background: #7f1d1d; color: #fca5a5; }
    #toast.success { background: #14532d; color: #86efac; }
  </style>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="history.back()"><i class="fa fa-arrow-left"></i></button>
  <h1>Новое мероприятие</h1>
</div>

<div class="form-wrap">

  <div class="form-section">
    <div class="form-section-title">Тип мероприятия</div>
    <div class="type-grid">
      <div class="type-btn active" data-type="drive" onclick="selectType('drive')"><span class="type-icon">🚗</span><span class="type-label">Поездка</span></div>
      <div class="type-btn" data-type="meet" onclick="selectType('meet')"><span class="type-icon">👋</span><span class="type-label">Встреча</span></div>
      <div class="type-btn" data-type="race" onclick="selectType('race')"><span class="type-icon">🏁</span><span class="type-label">Гонка</span></div>
      <div class="type-btn" data-type="drift" onclick="selectType('drift')"><span class="type-icon">💨</span><span class="type-label">Дрифт</span></div>
      <div class="type-btn" data-type="show" onclick="selectType('show')"><span class="type-icon">🏎️</span><span class="type-label">Шоу</span></div>
      <div class="type-btn" data-type="offroad" onclick="selectType('offroad')"><span class="type-icon">🏔️</span><span class="type-label">Офроад</span></div>
      <div class="type-btn" data-type="photo" onclick="selectType('photo')"><span class="type-icon">📸</span><span class="type-label">Фотосессия</span></div>
      <div class="type-btn" data-type="other" onclick="selectType('other')"><span class="type-icon">⭐</span><span class="type-label">Другое</span></div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Основное</div>
    <div class="form-group">
      <label class="form-label">Название *</label>
      <input class="form-input" id="title" placeholder="Вечерний заезд по набережной" maxlength="100">
    </div>
    <div class="form-group">
      <label class="form-label">Описание</label>
      <textarea class="form-textarea" id="description" placeholder="Расскажи подробнее..."></textarea>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Фото</div>
    <div class="photos-upload-area" id="photos-upload-area">
      <div class="photos-upload-placeholder" id="photos-placeholder" onclick="document.getElementById('photos-input').click()">
        <i class="fa fa-images"></i>
        <span>Нажми чтобы добавить фото (можно несколько)</span>
      </div>
      <div class="photos-grid-preview" id="photos-grid-preview" style="display:none"></div>
      <div class="add-more-btn" id="add-more-btn" style="display:none" onclick="document.getElementById('photos-input').click()"><i class="fa fa-plus"></i> Добавить ещё</div>
    </div>
    <input type="file" id="photos-input" accept="image/jpeg,image/png,image/webp,image/gif" multiple style="display:none" onchange="handlePhotosChange(this)">
    <p class="hint">Первое фото — обложка. Нажми на любое фото чтобы сделать его обложкой.</p>
  </div>

  <div class="form-section">
    <div class="form-section-title">Дата и место</div>
    <div class="form-group">
      <label class="form-label">Начало *</label>
      <input class="form-input" id="date-start" type="datetime-local">
    </div>
    <div class="form-group">
      <label class="form-label">Конец (необязательно)</label>
      <input class="form-input" id="date-end" type="datetime-local">
    </div>
    <div class="form-group">
      <label class="form-label">Город</label>
      <input class="form-input" id="city" placeholder="Москва">
    </div>
    <div class="form-group">
      <label class="form-label">Адрес / место встречи</label>
      <input class="form-input" id="address" placeholder="ул. Ленина 1, парковка ТЦ...">
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Участники</div>
    <div class="form-group">
      <label class="form-label">Максимум участников (0 = без ограничений)</label>
      <input class="form-input" id="max-participants" type="number" min="0" value="0">
    </div>
    <div class="form-group">
      <div class="toggle-row">
        <span class="toggle-label">Бесплатное мероприятие</span>
        <button class="toggle on" id="free-toggle" onclick="toggleFree()"></button>
      </div>
    </div>
    <div class="form-group" id="price-group" style="display:none;">
      <label class="form-label">Взнос (₽)</label>
      <input class="form-input" id="price" type="number" min="0" placeholder="500">
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">Теги</div>
    <div class="tags-input-wrap">
      <input class="tags-input" id="tag-input" placeholder="дрифт, классика, BMW..." maxlength="20"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addTag();}">
      <button class="tag-add-btn" onclick="addTag()">+</button>
    </div>
    <div class="tags-list" id="tags-list"></div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitEvent()">
    🚀 Создать мероприятие
  </button>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPA_URL = 'https://ktqiyywdgokktiwavgbq.supabase.co';
  const SUPA_KEY = 'sb_publishable_UqkqWGlqU0Slw7a4azOoGg_l8E3vUYP';
  const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

  let currentUser  = null;
  let selectedType = 'drive';
  let isFree       = true;
  let tags         = [];
  let photoFiles = []; // массив {file, url, isCover}
  let coverFile = null; // для обратной совместимости

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (type||'info');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3000);
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { location.href = 'auth.html'; return; }
    currentUser = session.user;
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    const nowStr = now.toISOString().slice(0, 16);
    document.getElementById('date-start').min = nowStr;
    document.getElementById('date-end').min = nowStr;
  }

  function selectType(type) {
    selectedType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-type="' + type + '"]').classList.add('active');
  }

  function toggleFree() {
    isFree = !isFree;
    document.getElementById('free-toggle').classList.toggle('on', isFree);
    document.getElementById('price-group').style.display = isFree ? 'none' : 'block';
  }

  function addTag() {
    const input = document.getElementById('tag-input');
    const val = input.value.trim().replace(/^#/, '').toLowerCase();
    if (!val || tags.includes(val) || tags.length >= 10) return;
    tags.push(val);
    input.value = '';
    renderTags();
  }

  function removeTag(tag) {
    tags = tags.filter(t => t !== tag);
    renderTags();
  }

  function renderTags() {
    document.getElementById('tags-list').innerHTML = tags.map(t =>
      '<div class="tag-item">#' + t + '<button class="tag-remove" onclick="removeTag(\'' + t + '\')">✕</button></div>'
    ).join('');
  }

  function handlePhotosChange(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    files.forEach(function(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const isCover = photoFiles.length === 0;
        photoFiles.push({ file: file, url: e.target.result, isCover: isCover });
        if (isCover) coverFile = file;
        renderPhotoPreviews();
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }

  function renderPhotoPreviews() {
    const placeholder = document.getElementById('photos-placeholder');
    const grid = document.getElementById('photos-grid-preview');
    const addMore = document.getElementById('add-more-btn');
    if (photoFiles.length === 0) {
      placeholder.style.display = 'flex';
      grid.style.display = 'none';
      addMore.style.display = 'none';
      return;
    }
    placeholder.style.display = 'none';
    grid.style.display = 'grid';
    addMore.style.display = 'flex';
    grid.innerHTML = photoFiles.map(function(p, i) {
      return '<div class="photo-thumb' + (p.isCover ? ' is-cover' : '') + '" onclick="setCover(' + i + ')">' +
        '<img src="' + p.url + '" alt="">' +
        (p.isCover ? '<div class="cover-badge">ОБЛОЖКА</div>' : '') +
        '<button class="remove-photo" onclick="removePhoto(event,' + i + ')"><i class="fa fa-times"></i></button>' +
        '</div>';
    }).join('');
  }

  function setCover(idx) {
    photoFiles.forEach(function(p, i) { p.isCover = (i === idx); });
    coverFile = photoFiles[idx].file;
    renderPhotoPreviews();
  }

  function removePhoto(e, idx) {
    e.stopPropagation();
    photoFiles.splice(idx, 1);
    if (photoFiles.length > 0 && !photoFiles.some(function(p) { return p.isCover; })) {
      photoFiles[0].isCover = true;
      coverFile = photoFiles[0].file;
    } else if (photoFiles.length === 0) {
      coverFile = null;
    }
    renderPhotoPreviews();
  }

  async function submitEvent() {
    if (!currentUser) {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { location.href = 'auth.html'; return; }
      currentUser = session.user;
    }

    const title       = document.getElementById('title').value.trim();
    const description = document.getElementById('description').value.trim();
    const dateStart   = document.getElementById('date-start').value;
    const dateEnd     = document.getElementById('date-end').value;
    const city        = document.getElementById('city').value.trim();
    const address     = document.getElementById('address').value.trim();
    const maxP        = parseInt(document.getElementById('max-participants').value) || 0;
    const price       = parseInt(document.getElementById('price').value) || 0;

    if (!title)     { showToast('Введи название', 'error'); return; }
    if (!dateStart) { showToast('Укажи дату начала', 'error'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Создаём...';

    let finalCoverUrl = null;
    let finalPhotos = [];
    if (photoFiles.length > 0) {
      try {
        for (let i = 0; i < photoFiles.length; i++) {
          const pf = photoFiles[i];
          const ext = pf.file.name.split('.').pop().toLowerCase();
          const fpath = 'events/' + currentUser.id + '/' + Date.now() + '_' + i + '.' + ext;
          const { error: upErr } = await sb.storage.from('photos').upload(fpath, pf.file, { upsert: true, contentType: pf.file.type });
          if (!upErr) {
            const { data: urlData } = sb.storage.from('photos').getPublicUrl(fpath);
            finalPhotos.push(urlData.publicUrl);
            if (pf.isCover) finalCoverUrl = urlData.publicUrl;
          }
        }
        if (!finalCoverUrl && finalPhotos.length > 0) finalCoverUrl = finalPhotos[0];
      } catch(e) { console.warn('upload error:', e); }
    }

    const { data, error } = await sb.from('events').insert({
      owner_id:         currentUser.id,
      title,
      description:      description || null,
      type:             selectedType,
      cover_photo:      finalCoverUrl,
      photos:           finalPhotos.length ? finalPhotos : null,
      city:             city || null,
      address:          address || null,
      date_start:       dateStart ? new Date(dateStart).toISOString() : null,
      date_end:         dateEnd   ? new Date(dateEnd).toISOString()   : null,
      max_participants: maxP || null,
      is_free:          isFree,
      price:            isFree ? 0 : price,
      tags:             tags.length ? tags : null,
      status:           'active'
    }).select().single();

    if (error) {
      console.error('Ошибка:', error);
      showToast('Ошибка: ' + error.message, 'error');
      btn.disabled = false;
      btn.textContent = '🚀 Создать мероприятие';
      return;
    }

    showToast('Мероприятие создано! 🎉', 'success');
    setTimeout(() => { location.href = 'event-card.html?id=' + data.id; }, 1200);
  }

  init();
</script>
</body>
</html>
