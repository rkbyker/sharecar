<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<title>Sharecar — Поиск</title>
<link rel="stylesheet" href="../css/app.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#fff;font-family:-apple-system,sans-serif;overflow-x:hidden}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#0f0f0f;border-bottom:1px solid #1e1e1e;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:20px;font-weight:700;flex:1}
.search-wrap{flex:1;position:relative}
.search-input{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;padding:10px 14px 10px 38px;font-size:15px;outline:none}
.search-input::placeholder{color:#555}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;font-size:14px}

/* MAIN TABS */
.main-tabs{display:flex;border-bottom:1px solid #1e1e1e;background:#0f0f0f;position:sticky;top:57px;z-index:90}
.main-tab{flex:1;padding:13px;text-align:center;font-size:14px;font-weight:600;color:#555;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.main-tab.active{color:#fff;border-bottom-color:#fff}

/* TAB PANELS */
.tab-panel{display:none;padding-bottom:100px}
.tab-panel.active{display:block}

/* GLOBE */
.globe-section{position:relative;width:100%;height:360px;overflow:hidden;background:radial-gradient(ellipse at center,#0a0a1a 0%,#0f0f0f 100%)}
#globe-canvas{width:100%;height:100%;display:block}
.globe-overlay{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,#0f0f0f 80%)}

/* POPUP над глобусом */
.globe-popup{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(20,20,40,.95);backdrop-filter:blur(12px);border:1px solid #333;border-radius:16px;padding:14px 18px;min-width:220px;max-width:300px;z-index:50;display:none;animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) scale(.9)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.globe-popup-close{position:absolute;top:8px;right:10px;background:none;border:none;color:#888;font-size:16px;cursor:pointer}
.globe-popup-title{font-size:15px;font-weight:700;margin-bottom:4px}
.globe-popup-sub{font-size:12px;color:#888;margin-bottom:10px}
.globe-popup-btn{width:100%;background:#fff;color:#000;border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer}

/* FILTERS */
.filter-bar{display:flex;overflow-x:auto;gap:8px;padding:12px 16px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.f-chip{flex-shrink:0;background:#1a1a1a;border:1px solid #333;color:#aaa;padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s;white-space:nowrap}
.f-chip.active{background:#fff;color:#000;border-color:#fff}

/* CARDS */
.cards-list{padding:0 12px}
.person-card{display:flex;align-items:center;gap:12px;background:#141414;border:1px solid #1e1e1e;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.person-card:active{border-color:#555}
.person-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;background:#333;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff}
.person-info{flex:1;min-width:0}
.person-name{font-size:15px;font-weight:600;margin-bottom:3px}
.person-meta{font-size:12px;color:#777;display:flex;gap:10px;flex-wrap:wrap}
.person-level{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;background:#1e1e1e;color:#aaa}
.person-arrow{color:#444;font-size:14px}

.ev-card{background:#141428;border:1px solid #1e1e3a;border-radius:14px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.ev-card:active{border-color:#555}
.ev-cover{height:140px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;overflow:hidden}
.ev-cover img{width:100%;height:100%;object-fit:cover}
.ev-type-pill{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.ev-date-pill{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;padding:4px 10px;border-radius:20px;font-size:11px}
.ev-body{padding:12px 14px}
.ev-title{font-size:15px;font-weight:700;margin-bottom:5px}
.ev-meta{font-size:12px;color:#666;display:flex;gap:10px}
.ev-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.ev-free{color:#22c55e;font-size:13px;font-weight:600}
.ev-paid{color:#f59e0b;font-size:14px;font-weight:700}
.ev-go{background:#1e1e3a;color:#fff;border:none;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer}

.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px}
.section-title{font-size:17px;font-weight:700}

.empty-state{text-align:center;padding:60px 20px;color:#555}
.empty-state .icon{font-size:48px;margin-bottom:12px}

.loader-wrap{display:flex;justify-content:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid #333;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #1e1e1e;display:flex;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;color:#555;background:none;border:none;font-size:10px;gap:4px;cursor:pointer;transition:color .2s;text-decoration:none}
.nav-item.active,.nav-item:hover{color:#fff}
.nav-item i{font-size:20px}
</style>
</head>
<body>

<div class="top-bar">
  <div class="search-wrap">
    <i class="fas fa-search search-icon"></i>
    <input class="search-input" id="search-input" type="text" placeholder="Поиск людей и мероприятий..." oninput="onSearch(this.value)">
  </div>
</div>

<div class="main-tabs">
  <div class="main-tab active" id="tab-events" onclick="switchTab('events')">🎉 Мероприятия</div>
  <div class="main-tab" id="tab-people" onclick="switchTab('people')">👥 Люди</div>
</div>

<!-- EVENTS TAB -->
<div class="tab-panel active" id="panel-events">
  <div class="globe-section">
    <canvas id="globe-canvas"></canvas>
    <div class="globe-overlay"></div>
    <div class="globe-popup" id="globe-popup">
      <button class="globe-popup-close" onclick="closePopup()">✕</button>
      <div class="globe-popup-title" id="popup-title"></div>
      <div class="globe-popup-sub" id="popup-sub"></div>
      <button class="globe-popup-btn" id="popup-btn">Открыть →</button>
    </div>
  </div>

  <div class="filter-bar" id="ev-filters">
    <div class="f-chip active" data-type="" onclick="selectEvFilter(this)">Все</div>
    <div class="f-chip" data-type="drive" onclick="selectEvFilter(this)">🚗 Поездки</div>
    <div class="f-chip" data-type="meet" onclick="selectEvFilter(this)">👋 Встречи</div>
    <div class="f-chip" data-type="race" onclick="selectEvFilter(this)">🏁 Гонки</div>
    <div class="f-chip" data-type="drift" onclick="selectEvFilter(this)">🌀 Дрифт</div>
    <div class="f-chip" data-type="show" onclick="selectEvFilter(this)">🏆 Шоу</div>
    <div class="f-chip" data-type="offroad" onclick="selectEvFilter(this)">🏔 Офроад</div>
  </div>

  <div class="section-header">
    <div class="section-title" id="ev-count-title">Мероприятия</div>
  </div>
  <div class="cards-list" id="events-list">
    <div class="loader-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- PEOPLE TAB -->
<div class="tab-panel" id="panel-people">
  <div class="filter-bar" id="people-filters">
    <div class="f-chip active" data-city="" onclick="selectPeopleFilter(this)">Все города</div>
  </div>
  <div class="section-header">
    <div class="section-title" id="people-count-title">Люди</div>
  </div>
  <div class="cards-list" id="people-list">
    <div class="loader-wrap"><div class="spinner"></div></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="goPage('index.html')"><i class="fas fa-home"></i><span>Лента</span></button>
  <button class="nav-item active"><i class="fas fa-search"></i><span>Поиск</span></button>
  <button class="nav-item" onclick="goPage('messages.html')" style="position:relative;"><i class="fas fa-comment"></i><span>Сообщения</span></button>
  <button class="nav-item" onclick="goPage('rating.html')"><i class="fas fa-trophy"></i><span>Рейтинг</span></button>
  <button class="nav-item" onclick="goPage('profile.html')"><i class="fas fa-user"></i><span>Профиль</span></button>
</nav>

<!-- Three.js глобус -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ── Глобус ──────────────────────────────────────────────
const canvas = document.getElementById('globe-canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth/360, 0.1, 100);
camera.position.z = 2.5;

// Глобус
const geo = new THREE.SphereGeometry(1, 64, 64);
const mat = new THREE.MeshPhongMaterial({color:0x0a1628, transparent:true, opacity:0.95, shininess:30});
const globe = new THREE.Mesh(geo, mat);
scene.add(globe);

// Сетка (меридианы и параллели)
const wireGeo = new THREE.SphereGeometry(1.001, 24, 24);
const wireMat = new THREE.MeshBasicMaterial({color:0x1e3a5f, wireframe:true, transparent:true, opacity:0.25});
scene.add(new THREE.Mesh(wireGeo, wireMat));

// Свет
scene.add(new THREE.AmbientLight(0x334466, 1.5));
const dirLight = new THREE.DirectionalLight(0x6699ff, 2);
dirLight.position.set(2,2,2);
scene.add(dirLight);

// Флажки (маркеры)
const markers = [];
window._globeItems = [];

function latLngToVec3(lat, lng, r=1.03) {
  const phi = (90-lat)*Math.PI/180;
  const theta = (lng+180)*Math.PI/180;
  return new THREE.Vector3(-Math.sin(phi)*Math.cos(theta)*r, Math.cos(phi)*r, Math.sin(phi)*Math.sin(theta)*r);
}

function addMarker(lat, lng, color, item) {
  const pos = latLngToVec3(lat, lng);
  const mg = new THREE.SphereGeometry(0.025, 8, 8);
  const mm = new THREE.MeshBasicMaterial({color});
  const mesh = new THREE.Mesh(mg, mm);
  mesh.position.copy(pos);
  mesh.userData = {item, lat, lng};
  scene.add(mesh);
  markers.push(mesh);

  // Пульсирующее кольцо
  const rg = new THREE.RingGeometry(0.03, 0.045, 16);
  const rm = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.5, side:THREE.DoubleSide});
  const ring = new THREE.Mesh(rg, rm);
  ring.position.copy(pos);
  ring.lookAt(0,0,0);
  ring.userData = {pulse:true, phase:Math.random()*Math.PI*2};
  scene.add(ring);
}

function updateMarkers(items, type) {
  markers.forEach(m => scene.remove(m));
  markers.length = 0;
  window._globeItems = items;
  items.forEach(item => {
    if (item.lat && item.lng) {
      const color = type==='event' ? 0x22c55e : 0x3b82f6;
      addMarker(parseFloat(item.lat), parseFloat(item.lng), color, item);
    }
  });
}

// Resize
function resize() {
  const w = canvas.parentElement.clientWidth;
  const h = 360;
  renderer.setSize(w, h, false);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// Drag to rotate
let isDragging=false, prevX=0, prevY=0;
canvas.addEventListener('mousedown', e=>{isDragging=true;prevX=e.clientX;prevY=e.clientY;});
canvas.addEventListener('touchstart', e=>{isDragging=true;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;},{passive:true});
window.addEventListener('mouseup', ()=>isDragging=false);
window.addEventListener('touchend', ()=>isDragging=false);
window.addEventListener('mousemove', e=>{if(!isDragging)return;const dx=e.clientX-prevX,dy=e.clientY-prevY;globe.rotation.y+=dx*0.005;globe.rotation.x+=dy*0.005;prevX=e.clientX;prevY=e.clientY;});
window.addEventListener('touchmove', e=>{if(!isDragging)return;const dx=e.touches[0].clientX-prevX,dy=e.touches[0].clientY-prevY;globe.rotation.y+=dx*0.005;globe.rotation.x+=dy*0.005;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;},{passive:true});

// Click on marker
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
canvas.addEventListener('click', e=>{
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(markers);
  if(hits.length){
    const item = hits[0].object.userData.item;
    showPopup(item);
  }
});

function showPopup(item) {
  const popup = document.getElementById('globe-popup');
  const isEvent = !!item.title;
  document.getElementById('popup-title').textContent = isEvent ? item.title : ((item.first_name||'')+(item.last_name?' '+item.last_name:''));
  document.getElementById('popup-sub').textContent = isEvent
    ? ([item.city, item.type].filter(Boolean).join(' · '))
    : ([item.city, item.level].filter(Boolean).join(' · '));
  const btn = document.getElementById('popup-btn');
  btn.onclick = () => { goPage(isEvent ? 'event-card.html?id='+item.id : 'user-profile.html?id='+item.id); };
  popup.style.display = 'block';
}
window.closePopup = () => { document.getElementById('globe-popup').style.display='none'; };

// Auto-rotate
let autoRotate = true;
canvas.addEventListener('mousedown', ()=>autoRotate=false);
canvas.addEventListener('touchstart', ()=>autoRotate=false, {passive:true});
setTimeout(()=>autoRotate=true, 3000);

// Animate
let t=0;
function animate() {
  requestAnimationFrame(animate);
  t+=0.016;
  if(autoRotate) globe.rotation.y += 0.002;
  scene.children.forEach(obj => {
    if(obj.userData?.pulse) {
      obj.material.opacity = 0.3+0.3*Math.sin(t*2+obj.userData.phase);
    }
  });
  renderer.render(scene, camera);
}
animate();

// ── App logic ──────────────────────────────────────────
let currentTab = 'events';
let allEvents = [], allPeople = [];
let evFilter = '', peopleFilter = '', searchQ = '';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

function selectEvFilter(el) {
  document.querySelectorAll('#ev-filters .f-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  evFilter = el.dataset.type;
  renderEvents();
}

function selectPeopleFilter(el) {
  document.querySelectorAll('#people-filters .f-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  peopleFilter = el.dataset.city;
  renderPeople();
}

function onSearch(val) {
  searchQ = val.toLowerCase();
  renderEvents();
  renderPeople();
}

function goPage(url) { window.location.href = url; }

const TYPE_LABELS={drive:'🚗 Поездка',meet:'👋 Встреча',race:'🏁 Гонка',drift:'🌀 Дрифт',show:'🏆 Шоу',offroad:'🏔 Офроад',photo:'📸 Фотосессия',other:'📌 Другое'};
const TYPE_ICONS={drive:'🚗',meet:'👋',race:'🏁',drift:'🌀',show:'🏆',offroad:'🏔',photo:'📸',other:'📌'};

function renderEvents() {
  let list = allEvents;
  if(evFilter) list = list.filter(e=>e.type===evFilter);
  if(searchQ) list = list.filter(e=>(e.title||'').toLowerCase().includes(searchQ)||(e.city||'').toLowerCase().includes(searchQ));
  document.getElementById('ev-count-title').textContent = 'Мероприятия ('+list.length+')';
  updateMarkers(list, 'event');
  if(!list.length){
    document.getElementById('events-list').innerHTML='<div class="empty-state"><div class="icon">🎉</div><p>Мероприятий не найдено</p></div>';
    return;
  }
  document.getElementById('events-list').innerHTML = list.map(ev=>{
    const ds = ev.date_start ? new Date(ev.date_start) : null;
    const dateStr = ds ? ds.toLocaleString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    const loc = [ev.city,ev.address].filter(Boolean).join(', ');
    const coverHtml = ev.cover_photo ? `<img src="${ev.cover_photo}" alt="" loading="lazy">` : (TYPE_ICONS[ev.type]||'🎉');
    return `<div class="ev-card" onclick="goPage('event-card.html?id=${ev.id}')">
      <div class="ev-cover">${coverHtml}<span class="ev-type-pill">${TYPE_LABELS[ev.type]||'Мероприятие'}</span>${dateStr?`<span class="ev-date-pill">📅 ${dateStr}</span>`:''}</div>
      <div class="ev-body">
        <div class="ev-title">${ev.title}</div>
        <div class="ev-meta">${loc?`<span>📍 ${loc}</span>`:''}<span>👥 ${ev.participants_count||0}</span><span>❤️ ${ev.likes||0}</span></div>
        <div class="ev-footer"><span class="${ev.is_free?'ev-free':'ev-paid'}">${ev.is_free?'Бесплатно':ev.price+' ₽'}</span><button class="ev-go" onclick="event.stopPropagation();goPage('event-card.html?id=${ev.id}')">Подробнее →</button></div>
      </div>
    </div>`;
  }).join('');
}

function renderPeople() {
  let list = allPeople;
  if(peopleFilter) list = list.filter(p=>p.city===peopleFilter);
  if(searchQ) list = list.filter(p=>((p.first_name||'')+' '+(p.last_name||'')).toLowerCase().includes(searchQ)||(p.city||'').toLowerCase().includes(searchQ));
  document.getElementById('people-count-title').textContent = 'Люди ('+list.length+')';
  if(currentTab==='people') updateMarkers(list, 'people');
  if(!list.length){
    document.getElementById('people-list').innerHTML='<div class="empty-state"><div class="icon">👥</div><p>Пользователей не найдено</p></div>';
    return;
  }
  document.getElementById('people-list').innerHTML = list.map(p=>{
    const name = (p.first_name||'') + (p.last_name?' '+p.last_name:'');
    const initials = (p.first_name||'?')[0];
    const avatarHtml = p.avatar_url
      ? `<img class="person-avatar" src="${p.avatar_url}" alt="">`
      : `<div class="person-avatar">${initials}</div>`;
    return `<div class="person-card" onclick="goPage('user-profile.html?id=${p.id}')">
      ${avatarHtml}
      <div class="person-info">
        <div class="person-name">${name||'Участник'}</div>
        <div class="person-meta">${p.city?`<span>📍 ${p.city}</span>`:''}<span>🚗 ${p.trips_driven||0} поездок</span></div>
      </div>
      <span class="person-level">${p.level||'Bronze'}</span>
      <i class="fas fa-chevron-right person-arrow"></i>
    </div>`;
  }).join('');
}

// Загрузка данных через Supabase
</script>
<script type="module">
import { supabase } from '../js/supabase.js';

async function loadData() {
  const [evRes, peopleRes] = await Promise.all([
    supabase.from('events').select('*').eq('status','active').order('created_at',{ascending:false}).limit(100),
    supabase.from('profiles').select('id,first_name,last_name,avatar_url,city,level,trips_driven,lat,lng').order('created_at',{ascending:false}).limit(200)
  ]);

  // Events
  window.allEvents = evRes.data || [];
  renderEvents();

  // People
  window.allPeople = peopleRes.data || [];

  // City filters
  const cities = [...new Set((peopleRes.data||[]).map(p=>p.city).filter(Boolean))].sort();
  const bar = document.getElementById('people-filters');
  cities.forEach(city=>{
    const chip = document.createElement('div');
    chip.className='f-chip';
    chip.dataset.city=city;
    chip.textContent='📍 '+city;
    chip.onclick=()=>selectPeopleFilter(chip);
    bar.appendChild(chip);
  });
  renderPeople();
}

// Переопределяем renderEvents/renderPeople с доступом к window переменным
const origRenderEvents = window.renderEvents;
window.allEvents = [];
window.allPeople = [];

loadData();
</script>
</body>
</html>
