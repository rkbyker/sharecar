<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<title>Sharecar — Поиск</title>
<link rel="stylesheet" href="../css/app.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000810;color:#fff;font-family:-apple-system,sans-serif}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#0f0f0f;border-bottom:1px solid #1e1e1e;position:sticky;top:0;z-index:100}
.search-wrap{flex:1;position:relative}
.search-input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;color:#fff;padding:10px 14px 10px 38px;font-size:15px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:#444}
.search-input::placeholder{color:#555}
.search-icon-inp{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;font-size:14px}

/* TABS */
.main-tabs{display:flex;border-bottom:1px solid #1e1e1e;background:#0f0f0f;position:sticky;top:57px;z-index:90}
.main-tab{flex:1;padding:13px;text-align:center;font-size:14px;font-weight:600;color:#555;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.main-tab.active{color:#fff;border-bottom-color:#fff}

.tab-panel{display:none;min-height:calc(100vh - 60px)}
.tab-panel.active{display:block;min-height:calc(100vh - 60px)}

/* GLOBE WRAPPER */
.globe-wrap{position:relative;width:100%;background:#000;overflow:hidden;transition:height .4s cubic-bezier(.4,0,.2,1)}
.globe-wrap.normal{height:calc(100vh - 140px)}
.globe-wrap.fullscreen{height:100vh;position:fixed;inset:0;z-index:200}
#globe-canvas-ev, #globe-canvas-us{width:100%;height:100%;display:block;cursor:grab}
#globe-canvas-ev:active, #globe-canvas-us:active{cursor:grabbing}

/* FILTER BUTTON над глобусом */
.globe-top-bar{position:absolute;top:12px;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:10;pointer-events:none}
.globe-top-bar>*{pointer-events:all}
.filter-toggle-btn{background:rgba(20,20,20,.85);backdrop-filter:blur(10px);border:1px solid #333;color:#fff;border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
.filter-toggle-btn:hover{background:rgba(40,40,40,.9)}
.expand-btn{background:rgba(20,20,20,.85);backdrop-filter:blur(10px);border:1px solid #333;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}

/* FILTER SHEET */
.filter-sheet{position:absolute;top:54px;left:14px;right:14px;background:rgba(16,16,24,.97);backdrop-filter:blur(16px);border:1px solid #2a2a2a;border-radius:16px;padding:16px;z-index:20;display:none;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.filter-sheet.open{display:block}
.fs-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;margin-top:12px}
.fs-label:first-child{margin-top:0}
.fs-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.fs-chip{background:#1a1a1a;border:1px solid #333;color:#aaa;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s}
.fs-chip.active{background:#fff;color:#000;border-color:#fff}
.fs-apply{width:100%;margin-top:14px;background:#fff;color:#000;border:none;border-radius:12px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}

/* POPUP */
.globe-popup{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(16,16,28,.97);backdrop-filter:blur(16px);border:1px solid #2a2a3a;border-radius:18px;padding:16px 18px;min-width:240px;max-width:320px;z-index:30;display:none;animation:popUp .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes popUp{from{opacity:0;transform:translateX(-50%) translateY(12px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.popup-close{position:absolute;top:10px;right:12px;background:none;border:none;color:#666;font-size:16px;cursor:pointer}
.popup-title{font-size:16px;font-weight:700;margin-bottom:3px;padding-right:20px}
.popup-sub{font-size:12px;color:#888;margin-bottom:12px}
.popup-btn{width:100%;background:#fff;color:#000;border:none;border-radius:12px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.popup-btn:hover{opacity:.85}

/* FULLSCREEN CLOSE */
.fs-close{position:absolute;top:12px;right:14px;background:rgba(20,20,20,.85);backdrop-filter:blur(10px);border:1px solid #333;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;z-index:210;display:none}
.globe-wrap.fullscreen .fs-close{display:flex}
.globe-wrap.fullscreen .expand-btn{display:none}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;box-sizing:border-box;background:#111;border-top:1px solid #1e1e1e;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;color:#555;background:none;border:none;font-size:10px;gap:4px;cursor:pointer;transition:color .2s}
.nav-item.active,.nav-item:hover{color:#fff}
.nav-item i{font-size:20px}

.pb-spacer{height:80px}

</style>
</head>
<body>

<div class="top-bar">
  <div class="search-wrap">
    <i class="fas fa-search search-icon-inp"></i>
    <input class="search-input" id="search-input" type="text" placeholder="Поиск..." oninput="onSearch(this.value)">
  </div>
</div>

<div class="main-tabs">
  <div class="main-tab active" id="tab-events" onclick="switchTab('events')">🎉 Мероприятия</div>
  <div class="main-tab" id="tab-users" onclick="switchTab('users')">👤 Пользователи</div>
</div>

<!-- EVENTS TAB -->
<div class="tab-panel active" id="panel-events">
  <div class="globe-wrap normal" id="globe-wrap-ev">
    <canvas id="globe-canvas-ev"></canvas>

    <div class="globe-top-bar">
      <button class="filter-toggle-btn" onclick="toggleFilterSheet('ev')">
        <i class="fas fa-sliders-h"></i> Фильтры
      </button>
      <button class="expand-btn" onclick="toggleFullscreen('ev')" title="На весь экран">
        <i class="fas fa-expand"></i>
      </button>
    </div>

    <div class="filter-sheet" id="filter-sheet-ev">
      <div class="fs-label">Тип мероприятия</div>
      <div class="fs-chips">
        <div class="fs-chip active" data-val="" onclick="toggleFsChip(this,'ev-type',false)">Все</div>
        <div class="fs-chip" data-val="drive" onclick="toggleFsChip(this,'ev-type',false)">🚗 Поездка</div>
        <div class="fs-chip" data-val="meet" onclick="toggleFsChip(this,'ev-type',false)">👋 Встреча</div>
        <div class="fs-chip" data-val="race" onclick="toggleFsChip(this,'ev-type',false)">🏁 Гонка</div>
        <div class="fs-chip" data-val="drift" onclick="toggleFsChip(this,'ev-type',false)">🌀 Дрифт</div>
        <div class="fs-chip" data-val="show" onclick="toggleFsChip(this,'ev-type',false)">🏆 Шоу</div>
        <div class="fs-chip" data-val="offroad" onclick="toggleFsChip(this,'ev-type',false)">🏔 Офроад</div>
      </div>
      <div class="fs-label">Город</div>
      <div class="fs-chips" id="ev-city-chips">
        <div class="fs-chip active" data-val="" onclick="toggleFsChip(this,'ev-city',false)">Все города</div>
      </div>
      <button class="fs-apply" onclick="applyFilters('ev')">Применить</button>
    </div>

    <div class="globe-popup" id="popup-ev">
      <button class="popup-close" onclick="closePopup('ev')">✕</button>
      <div class="popup-title" id="popup-ev-title"></div>
      <div class="popup-sub" id="popup-ev-sub"></div>
      <button class="popup-btn" id="popup-ev-btn">Открыть →</button>
    </div>

    <button class="fs-close" onclick="toggleFullscreen('ev')"><i class="fas fa-compress"></i></button>
  </div>
  <div class="pb-spacer"></div>
</div>

<!-- USERS TAB -->
<div class="tab-panel" id="panel-users">
  <div class="globe-wrap normal" id="globe-wrap-us">
    <canvas id="globe-canvas-us"></canvas>

    <div class="globe-top-bar">
      <button class="filter-toggle-btn" onclick="toggleFilterSheet('us')">
        <i class="fas fa-sliders-h"></i> Фильтры
      </button>
      <button class="expand-btn" onclick="toggleFullscreen('us')" title="На весь экран">
        <i class="fas fa-expand"></i>
      </button>
    </div>

    <div class="filter-sheet" id="filter-sheet-us">
      <div class="fs-label">Уровень</div>
      <div class="fs-chips">
        <div class="fs-chip active" data-val="" onclick="toggleFsChip(this,'us-level',false)">Все</div>
        <div class="fs-chip" data-val="Bronze" onclick="toggleFsChip(this,'us-level',false)">🥉 Bronze</div>
        <div class="fs-chip" data-val="Silver" onclick="toggleFsChip(this,'us-level',false)">🥈 Silver</div>
        <div class="fs-chip" data-val="Gold" onclick="toggleFsChip(this,'us-level',false)">🥇 Gold</div>
        <div class="fs-chip" data-val="Premium" onclick="toggleFsChip(this,'us-level',false)">💎 Premium</div>
        <div class="fs-chip" data-val="VIP" onclick="toggleFsChip(this,'us-level',false)">👑 VIP</div>
      </div>
      <div class="fs-label">Город</div>
      <div class="fs-chips" id="us-city-chips">
        <div class="fs-chip active" data-val="" onclick="toggleFsChip(this,'us-city',false)">Все города</div>
      </div>
      <button class="fs-apply" onclick="applyFilters('us')">Применить</button>
    </div>

    <div class="globe-popup" id="popup-us">
      <button class="popup-close" onclick="closePopup('us')">✕</button>
      <div class="popup-title" id="popup-us-title"></div>
      <div class="popup-sub" id="popup-us-sub"></div>
      <button class="popup-btn" id="popup-us-btn">Открыть →</button>
    </div>

    <button class="fs-close" onclick="toggleFullscreen('us')"><i class="fas fa-compress"></i></button>
  </div>
  <div class="pb-spacer"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="goPage('index.html')"><i class="fas fa-home"></i><span>Лента</span></button>
  <button class="nav-item active"><i class="fas fa-search"></i><span>Поиск</span></button>
  <button class="nav-item" onclick="goPage('messages.html')"><i class="fas fa-comment"></i><span>Сообщения</span></button>
  <button class="nav-item" onclick="goPage('rating.html')"><i class="fas fa-trophy"></i><span>Рейтинг</span></button>
  <button class="nav-item" onclick="goPage('profile.html')"><i class="fas fa-user"></i><span>Профиль</span></button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ── STATE ──────────────────────────────────────────────
let allEvents = [], allUsers = [];
let evFilters = {'ev-type':'','ev-city':''};
let usFilters = {'us-level':'','us-city':''};
let searchQ = '';
let currentTab = 'events';

function goPage(u){location.href=u}
function onSearch(v){searchQ=v.toLowerCase();updateGlobeMarkers()}

// ── TABS ──────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  updateGlobeMarkers();
  // resize canvas on show
  const sfx = tab==='events'?'ev':'us';
  setTimeout(()=>resizeGlobe(sfx),50);
}

// ── FILTERS ───────────────────────────────────────────
function toggleFilterSheet(sfx){
  const sheet=document.getElementById('filter-sheet-'+sfx);
  sheet.classList.toggle('open');
}
function toggleFsChip(el,group,multi){
  const parent=el.parentElement;
  if(!multi){parent.querySelectorAll('.fs-chip').forEach(c=>c.classList.remove('active'));}
  el.classList.toggle('active');
  if(!multi&&!el.classList.contains('active'))el.classList.add('active');
}
function applyFilters(sfx){
  if(sfx==='ev'){
    evFilters['ev-type']=getActiveChip('ev-type');
    evFilters['ev-city']=getActiveChip('ev-city');
  } else {
    usFilters['us-level']=getActiveChip('us-level');
    usFilters['us-city']=getActiveChip('us-city');
  }
  document.getElementById('filter-sheet-'+sfx).classList.remove('open');
  updateGlobeMarkers();
}
function getActiveChip(group){
  const chips=document.querySelectorAll(`[onclick*="${group}"]`);
  for(const c of chips){if(c.classList.contains('active'))return c.dataset.val;}
  return '';
}

// ── FULLSCREEN ────────────────────────────────────────
let fsState={ev:false,us:false};
function toggleFullscreen(sfx){
  const wrap=document.getElementById('globe-wrap-'+sfx);
  fsState[sfx]=!fsState[sfx];
  if(fsState[sfx]){
    wrap.classList.remove('normal');wrap.classList.add('fullscreen');
    document.body.style.overflow='hidden';
  } else {
    wrap.classList.remove('fullscreen');wrap.classList.add('normal');
    document.body.style.overflow='';
  }
  setTimeout(()=>resizeGlobe(sfx),50);
}

// ── POPUP ─────────────────────────────────────────────
function showPopup(sfx,title,sub,href){
  document.getElementById('popup-'+sfx+'-title').textContent=title;
  document.getElementById('popup-'+sfx+'-sub').textContent=sub;
  document.getElementById('popup-'+sfx+'-btn').onclick=()=>goPage(href);
  document.getElementById('popup-'+sfx).style.display='block';
}
function closePopup(sfx){document.getElementById('popup-'+sfx).style.display='none';}

// ── GLOBE ENGINE ──────────────────────────────────────
function createGlobe(canvasId, sfx) {
  const canvas = document.getElementById(canvasId);
  const renderer = new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45,1,0.1,100);
  camera.position.z = 2.8;

  // Ocean
  const geo = new THREE.SphereGeometry(1,64,64);
  const mat = new THREE.MeshPhongMaterial({color:0x040d1a,shininess:20,specular:0x112244});
  scene.add(new THREE.Mesh(geo,mat));

  // Atmosphere glow
  const atmGeo = new THREE.SphereGeometry(1.04,64,64);
  const atmMat = new THREE.MeshBasicMaterial({color:0x1a3a6a,transparent:true,opacity:0.15,side:THREE.BackSide});
  scene.add(new THREE.Mesh(atmGeo,atmMat));

  // Lights
  scene.add(new THREE.AmbientLight(0x223366,2));
  const dl=new THREE.DirectionalLight(0x88aaff,3);dl.position.set(3,2,2);scene.add(dl);
  const dl2=new THREE.DirectionalLight(0x2244aa,1);dl2.position.set(-2,-1,-2);scene.add(dl2);

  // Country borders via fetch GeoJSON
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r=>r.json())
    .then(world=>{
      // Use topojson-client via CDN (loaded below)
      if(window.topojson){
        drawBorders(scene, window.topojson.mesh(world, world.objects.countries));
      }
    }).catch(()=>{
      // fallback: draw lat/lng grid only
      drawGrid(scene);
    });

  // Grid as fallback/supplement
  drawGrid(scene);

  // Markers group
  const markersGroup = new THREE.Group();
  scene.add(markersGroup);

  // Interaction
  let isDrag=false,prevX=0,prevY=0,autoRot=true;
  let zoom=3.5; // camera z

  function onDragStart(x,y){isDrag=true;prevX=x;prevY=y;autoRot=false;}
  function onDragMove(x,y){
    if(!isDrag)return;
    const dx=x-prevX,dy=y-prevY;
    scene.rotation.y+=dx*0.005;
    scene.rotation.x+=dy*0.005;
    // clamp x rotation
    scene.rotation.x=Math.max(-1.2,Math.min(1.2,scene.rotation.x));
    prevX=x;prevY=y;
  }
  function onDragEnd(){isDrag=false;setTimeout(()=>autoRot=true,2000);}

  canvas.addEventListener('mousedown',e=>onDragStart(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>onDragMove(e.clientX,e.clientY));
  window.addEventListener('mouseup',onDragEnd);
  canvas.addEventListener('touchstart',e=>{const t=e.touches[0];onDragStart(t.clientX,t.clientY);},{passive:true});
  canvas.addEventListener('touchmove',e=>{const t=e.touches[0];onDragMove(t.clientX,t.clientY);},{passive:true});
  canvas.addEventListener('touchend',onDragEnd);

  // Pinch zoom
  let lastDist=0;
  canvas.addEventListener('touchstart',e=>{if(e.touches.length===2){lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      zoom-=(d-lastDist)*0.01;
      zoom=Math.max(1.2,Math.min(4,zoom));
      lastDist=d;
      camera.position.z=zoom;
    }
  },{passive:true});
  canvas.addEventListener('wheel',e=>{
    zoom+=e.deltaY*0.002;
    zoom=Math.max(1.2,Math.min(4,zoom));
    camera.position.z=zoom;
  },{passive:true});

  // Raycaster for marker click
  const raycaster=new THREE.Raycaster();
  const mouse2=new THREE.Vector2();
  canvas.addEventListener('click',e=>{
    if(isDrag)return;
    const rect=canvas.getBoundingClientRect();
    mouse2.x=((e.clientX-rect.left)/rect.width)*2-1;
    mouse2.y=-((e.clientY-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(mouse2,camera);
    const hits=raycaster.intersectObjects(markersGroup.children,true);
    if(hits.length){
      const item=hits[0].object.userData.item;
      if(item){
        const isEv=!!item.title;
        showPopup(sfx,
          isEv?item.title:((item.first_name||'')+(item.last_name?' '+item.last_name:'')),
          isEv?([item.city,item.type].filter(Boolean).join(' · ')):([item.city,item.level].filter(Boolean).join(' · ')),
          isEv?'event-card.html?id='+item.id:'user-profile.html?id='+item.id
        );
      }
    }
  });

  // Resize
  function resize(){
    const w=canvas.parentElement.clientWidth||window.innerWidth;
    const h=canvas.parentElement.clientHeight||window.innerHeight;
    renderer.setSize(w,h,false);
    camera.aspect=w/h;
    camera.updateProjectionMatrix();
  }
  resizeFns[sfx]=resize;
  resize();

  // Animate
  let t=0;
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    t += delta;
    if(autoRot) scene.rotation.y += 0.003 * delta * 60;
    // pulse markers
    markersGroup.children.forEach(m=>{
      if(m.userData.pulse){m.material.opacity=0.25+0.25*Math.sin(t*2+m.userData.phase);}
    });
    renderer.render(scene,camera);
  }
  animate();

  return {scene,markersGroup,camera,renderer};
}

function latLngToVec3(lat,lng,r=1.02){
  const phi=(90-lat)*Math.PI/180;
  const theta=(lng+180)*Math.PI/180;
  return new THREE.Vector3(
    -Math.sin(phi)*Math.cos(theta)*r,
    Math.cos(phi)*r,
    Math.sin(phi)*Math.sin(theta)*r
  );
}

function drawBorders(scene, mesh){
  // mesh is a GeoJSON MultiLineString
  const lines=[];
  if(mesh.type==='MultiLineString'){
    mesh.coordinates.forEach(line=>{
      const pts=line.map(([lng,lat])=>latLngToVec3(lat,lng,1.001));
      const bg=new THREE.BufferGeometry().setFromPoints(pts);
      const bm=new THREE.LineBasicMaterial({color:0x1e4d7a,transparent:true,opacity:0.6});
      scene.add(new THREE.Line(bg,bm));
    });
  }
}

function drawGrid(scene){
  // Lat lines every 30deg
  for(let lat=-60;lat<=60;lat+=30){
    const pts=[];
    for(let lng=-180;lng<=180;lng+=2)pts.push(latLngToVec3(lat,lng,1.001));
    const bg=new THREE.BufferGeometry().setFromPoints(pts);
    scene.add(new THREE.Line(bg,new THREE.LineBasicMaterial({color:0x0d2a4a,transparent:true,opacity:0.3})));
  }
  // Lng lines every 30deg
  for(let lng=-180;lng<=180;lng+=30){
    const pts=[];
    for(let lat=-90;lat<=90;lat+=2)pts.push(latLngToVec3(lat,lng,1.001));
    const bg=new THREE.BufferGeometry().setFromPoints(pts);
    scene.add(new THREE.Line(bg,new THREE.LineBasicMaterial({color:0x0d2a4a,transparent:true,opacity:0.3})));
  }
}

function addMarkers(group,items,color){
  // clear
  while(group.children.length)group.remove(group.children[0]);
  items.forEach(item=>{
    if(!item.lat||!item.lng)return;
    const pos=latLngToVec3(parseFloat(item.lat),parseFloat(item.lng));
    // dot
    const mg=new THREE.SphereGeometry(0.022,8,8);
    const mm=new THREE.MeshBasicMaterial({color});
    const mesh=new THREE.Mesh(mg,mm);
    mesh.position.copy(pos);
    mesh.userData={item};
    group.add(mesh);
    // ring pulse
    const rg=new THREE.RingGeometry(0.028,0.042,16);
    const rm=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.4,side:THREE.DoubleSide});
    const ring=new THREE.Mesh(rg,rm);
    ring.position.copy(pos);
    ring.lookAt(0,0,0);
    ring.userData={pulse:true,phase:Math.random()*Math.PI*2};
    group.add(ring);
  });
}

// Globes registry
const globes={};
const resizeFns={};

function resizeGlobe(sfx){if(resizeFns[sfx])resizeFns[sfx]();}
window.addEventListener('resize',()=>{Object.keys(resizeFns).forEach(s=>resizeFns[s]());});

// ── UPDATE MARKERS ────────────────────────────────────
function updateGlobeMarkers(){
  if(globes.ev){
    let evList=allEvents;
    if(evFilters['ev-type'])evList=evList.filter(e=>e.type===evFilters['ev-type']);
    if(evFilters['ev-city'])evList=evList.filter(e=>e.city===evFilters['ev-city']);
    if(searchQ)evList=evList.filter(e=>(e.title||'').toLowerCase().includes(searchQ)||(e.city||'').toLowerCase().includes(searchQ));
    addMarkers(globes.ev.markersGroup,evList,0x22c55e);
  }
  if(globes.us){
    let usList=allUsers;
    if(usFilters['us-level'])usList=usList.filter(u=>u.level===usFilters['us-level']);
    if(usFilters['us-city'])usList=usList.filter(u=>u.city===usFilters['us-city']);
    if(searchQ)usList=usList.filter(u=>((u.first_name||'')+' '+(u.last_name||'')).toLowerCase().includes(searchQ)||(u.city||'').toLowerCase().includes(searchQ));
    addMarkers(globes.us.markersGroup,usList,0x3b82f6);
  }
}

// Init globes on load
window.addEventListener('DOMContentLoaded',()=>{
  globes.ev=createGlobe('globe-canvas-ev','ev');
  globes.us=createGlobe('globe-canvas-us','us');
});
</script>

<!-- topojson for country borders -->
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<script type="module">
import { supabase } from '../js/supabase.js';

async function loadData(){
  const [evRes, usRes] = await Promise.all([
    supabase.from('events').select('id,title,type,city,cover_photo,is_free,price,participants_count,likes,lat,lng,date_start,status').eq('status','active').order('created_at',{ascending:false}).limit(200),
    supabase.from('profiles').select('id,first_name,last_name,avatar_url,city,level,trips_driven,lat,lng').order('created_at',{ascending:false}).limit(500)
  ]);

  window.allEvents = evRes.data||[];
  window.allUsers  = usRes.data||[];

  // City chips for events
  const evCities=[...new Set((evRes.data||[]).map(e=>e.city).filter(Boolean))].sort();
  const evCityBar=document.getElementById('ev-city-chips');
  evCities.forEach(city=>{
    const c=document.createElement('div');
    c.className='fs-chip';c.dataset.val=city;c.textContent='📍 '+city;
    c.setAttribute('onclick',`toggleFsChip(this,'ev-city',false)`);
    evCityBar.appendChild(c);
  });

  // City chips for users
  const usCities=[...new Set((usRes.data||[]).map(u=>u.city).filter(Boolean))].sort();
  const usCityBar=document.getElementById('us-city-chips');
  usCities.forEach(city=>{
    const c=document.createElement('div');
    c.className='fs-chip';c.dataset.val=city;c.textContent='📍 '+city;
    c.setAttribute('onclick',`toggleFsChip(this,'us-city',false)`);
    usCityBar.appendChild(c);
  });

  updateGlobeMarkers();
}

loadData();
</script>
