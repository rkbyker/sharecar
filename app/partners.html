<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<title>Sharecar — Партнёры</title>
<link rel="stylesheet" href="../css/app.css">
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sharecar">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<script src="/js/pwa.js" defer></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
/* ── Категории ── */
.cat-scroll { display:flex;overflow-x:auto;gap:8px;padding:12px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none; }
.cat-scroll::-webkit-scrollbar { display:none; }
.cat-chip {
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 14px;background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;cursor:pointer;transition:all 0.15s;min-width:64px;
}
.cat-chip.active { border-color:var(--accent);background:rgba(232,200,74,0.07); }
.cat-chip-icon { font-size:22px; }
.cat-chip-label { font-size:10px;font-weight:600;color:var(--text2);white-space:nowrap; }
.cat-chip.active .cat-chip-label { color:var(--accent); }

/* ── Баннер партнёра-спонсора ── */
.sponsor-banner {
  margin:0 16px 16px;border-radius:16px;overflow:hidden;position:relative;
  background:linear-gradient(135deg,#0a0f20,#111830);border:1px solid rgba(74,143,232,0.3);
  cursor:pointer;
}
.sponsor-inner { padding:20px; }
.sponsor-tag { display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;background:rgba(74,143,232,0.15);color:#4a8fe8;padding:3px 8px;border-radius:6px;margin-bottom:10px; }
.sponsor-title { font-size:20px;font-weight:800;margin-bottom:6px; }
.sponsor-desc { font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px; }
.sponsor-badges { display:flex;gap:6px;flex-wrap:wrap; }
.sponsor-badge { font-size:10px;padding:4px 10px;border-radius:8px;font-weight:600; }

/* ── Карточка партнёра ── */
.partner-card {
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  margin:0 16px 14px;overflow:hidden;cursor:pointer;transition:border-color 0.15s;
}
.partner-card:active { border-color:var(--accent); }
.partner-card-top { position:relative;height:140px;display:flex;align-items:center;justify-content:center; }
.partner-card-logo { font-size:56px; }
.partner-verified { position:absolute;top:10px;right:10px;background:rgba(74,143,232,0.15);border:1px solid rgba(74,143,232,0.3);color:#4a8fe8;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px; }
.partner-bonus-tag { position:absolute;top:10px;left:10px;background:rgba(232,200,74,0.15);border:1px solid rgba(232,200,74,0.3);color:#e8c84a;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px; }
.partner-body { padding:14px; }
.partner-name { font-size:16px;font-weight:700;margin-bottom:3px; }
.partner-cat { font-size:11px;color:var(--text3);margin-bottom:8px; }
.partner-desc { font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px; }
.partner-meta { display:flex;align-items:center;gap:12px;flex-wrap:wrap; }
.partner-rating { font-size:13px;font-weight:700;color:#e8c84a; }
.partner-location { font-size:11px;color:var(--text3); }
.partner-bonus-block {
  background:rgba(232,200,74,0.05);border:1px solid rgba(232,200,74,0.15);
  border-radius:10px;padding:10px 12px;margin-top:10px;
  display:flex;align-items:center;gap:10px;
}
.partner-bonus-ico { font-size:20px;flex-shrink:0; }
.partner-bonus-text { font-size:12px;color:var(--text2);line-height:1.5; }
.partner-bonus-text strong { color:var(--accent); }
.partner-actions { display:flex;gap:8px;margin-top:12px; }

/* ── Секция «Как работает» ── */
.how-section { margin:0 16px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px; }
.how-step { display:flex;align-items:flex-start;gap:12px;margin-bottom:14px; }
.how-step:last-child { margin-bottom:0; }
.how-num { width:28px;height:28px;border-radius:50%;background:var(--accent);color:#000;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.how-text { font-size:13px;color:var(--text2);line-height:1.5; }
.how-text strong { color:var(--text1); }

/* ── Раздел заголовок ── */
.section-head { padding:4px 16px 8px;display:flex;align-items:center;justify-content:space-between; }
.section-head-title { font-size:14px;font-weight:700; }
.section-head-count { font-size:12px;color:var(--text3); }
</style>
</head>
<body>
<div class="app-container">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">🤝</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Партнёры появятся скоро</div>
    <div style="font-size:14px;color:#666;line-height:1.6;">Здесь будут детейлинг-студии, треки, сервисы и другие партнёры Sharecar</div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="goPage('index.html')"><i class="fas fa-home"></i><span>Лента</span></button>
    <button class="nav-item active"><i class="fas fa-handshake"></i><span>Партнёры</span></button>
    <button class="nav-item" onclick="goPage('messages.html')"><i class="fas fa-comment"></i><span>Сообщения</span></button>
    <button class="nav-item" onclick="goPage('messages.html')"><i class="fas fa-comment"></i><span>Сообщения</span></button>
    <button class="nav-item" onclick="goPage('rating.html')"><i class="fas fa-trophy"></i><span>Рейтинг</span></button>
    <button class="nav-item" onclick="goPage('profile.html')"><i class="fas fa-user"></i><span>Профиль</span></button>
  </nav>
</div>

<!-- Боттом-шит: карточка партнёра -->
<div id="partner-sheet" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:600;align-items:flex-end;justify-content:center;" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:var(--bg2);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:430px;border:1px solid var(--border);">
    <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;"></div>
    <div id="partner-sheet-content"></div>
    <button class="btn btn-secondary btn-full" style="margin-top:12px;" onclick="document.getElementById('partner-sheet').style.display='none'">Закрыть</button>
  </div>
</div>

<div id="app-toast" style="display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:13px;z-index:9999;white-space:nowrap;box-shadow:var(--shadow);"></div>

<script>
function filterPartners(cat, btn) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.partner-card').forEach(card => {
    card.style.display = (cat === 'all' || card.dataset.cat === cat) ? '' : 'none';
  });
  // Спонсор-баннер
  const banner = document.querySelector('.sponsor-banner');
  if (banner) banner.style.display = (cat === 'all' || banner.dataset.cat === cat) ? '' : 'none';
}

function openPartner(id) {
  const data = {
    puredetail: {
      name: 'PureDetail Moscow',
      desc: 'Профессиональный детейлинг суперкаров. Работаем с Ferrari, Lamborghini, Porsche. Жидкое стекло Gyeon Quartz, полировка до зеркала, PPF-оклейка.',
      bonus: 'Оплата баллами до 50%. При полировке от 15 000 ₽ — бонус +500 баллов.',
      address: 'Хорошёвское ш., 38, Москва',
      phone: '+7 (495) 123-45-67',
      hours: 'Пн–Сб 9:00–20:00',
      rating: '4.9 ★ (87 отзывов)'
    },
    moscowkart: {
      name: 'Moscow Kart Club',
      desc: 'Профессиональная картинговая трасса 800 м. 25 современных карт Sodi RT8. Запись лучших кругов через Sharecar.',
      bonus: 'Оплата баллами до 40%. Участники Sharecar — приоритетная запись и −5%.',
      address: 'Шоссе Энтузиастов, 81, Москва',
      phone: '+7 (495) 987-65-43',
      hours: 'Ежедневно 10:00–22:00',
      rating: '4.7 ★ (240 отзывов)'
    }
  };
  const p = data[id];
  if (!p) { showToast('📋 Открываем страницу партнёра...'); return; }
  document.getElementById('partner-sheet-content').innerHTML = `
    <div style="font-size:18px;font-weight:800;margin-bottom:4px;">${p.name}</div>
    <div style="font-size:12px;color:#e8c84a;margin-bottom:12px;">${p.rating}</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;">${p.desc}</div>
    <div style="background:rgba(232,200,74,0.06);border:1px solid rgba(232,200,74,0.15);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--text2);">
      🪙 <strong style="color:var(--accent);">${p.bonus}</strong>
    </div>
    <div style="font-size:12px;color:var(--text2);line-height:2;">
      📍 ${p.address}<br>
      📞 ${p.phone}<br>
      🕐 ${p.hours}
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn btn-primary" style="flex:1;" onclick="showToast('📞 Звоним...');document.getElementById('partner-sheet').style.display='none'"><i class="fas fa-phone"></i> Позвонить</button>
      <button class="btn btn-secondary" onclick="showToast('📍 Открываем карту')"><i class="fas fa-map-marker-alt"></i></button>
    </div>
  `;
  document.getElementById('partner-sheet').style.display = 'flex';
}

function goPage(url) { window.location.href = url; }
function showToast(msg) {
  const t = document.getElementById('app-toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}
</script>
</body>
</html>
