<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sharecar — Вход</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <style>
    body { background: #0f0f0f; min-height: 100vh; display: flex; flex-direction: column; }

    .auth-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
    }

    .auth-logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #fff;
      margin-bottom: 6px;
    }
    .auth-logo span { color: #f59e0b; }

    .auth-tagline {
      color: #666;
      font-size: 14px;
      margin-bottom: 40px;
      text-align: center;
    }

    .auth-tabs {
      display: flex;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      width: 100%;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      border-radius: 8px;
      transition: all .2s;
    }
    .auth-tab.active {
      background: #f59e0b;
      color: #0f0f0f;
    }

    .auth-form { width: 100%; }
    .auth-form.hidden { display: none; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .form-input {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px 16px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border .2s;
      box-sizing: border-box;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: #f59e0b; }
    .form-input::placeholder { color: #444; }

    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .btn-auth {
      width: 100%;
      padding: 16px;
      background: #f59e0b;
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s;
    }
    .btn-auth:hover { opacity: .85; }
    .btn-auth:disabled { opacity: .5; cursor: not-allowed; }

    .btn-google {
      width: 100%;
      padding: 14px;
      background: #1a1a2e;
      color: #fff;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color .2s;
    }
    .btn-google:hover { border-color: #f59e0b; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #444;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a2a4a;
    }

    .auth-error {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      padding: 12px;
      color: #ef4444;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-error.show { display: block; }

    .auth-success {
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 8px;
      padding: 16px;
      color: #22c55e;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .auth-success.show { display: block; }

    .password-wrap { position: relative; }
    .password-wrap .form-input { padding-right: 48px; }
    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      cursor: pointer;
      font-size: 16px;
    }

    .form-hint {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    .forgot-link {
      color: #f59e0b;
      font-size: 13px;
      text-align: right;
      cursor: pointer;
      display: block;
      margin-top: -8px;
      margin-bottom: 16px;
    }

    .account-type-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .type-card {
      flex: 1;
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }
    .type-card.selected {
      border-color: #f59e0b;
      background: rgba(245,158,11,.08);
    }
    .type-card .icon { font-size: 24px; margin-bottom: 6px; }
    .type-card .label { font-size: 12px; font-weight: 600; color: #ccc; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .step-indicator {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2a2a4a;
      transition: background .2s;
    }
    .step-dot.active { background: #f59e0b; }
    .step-dot.done { background: #22c55e; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">Share<span>car</span></div>
    <div class="auth-tagline">Экосистема автомобильного сообщества</div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Войти</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Регистрация</div>
    </div>

    <!-- LOGIN FORM -->
    <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
      <div class="auth-error" id="login-error"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email"
               placeholder="your@email.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="login-password"
                 placeholder="••••••••" autocomplete="current-password" required>
          <span class="password-toggle" onclick="togglePwd('login-password', this)">
            <i class="fa fa-eye"></i>
          </span>
        </div>
      </div>

      <span class="forgot-link" onclick="handleForgot()">Забыл пароль?</span>

      <button class="btn-auth" id="btn-login" type="submit">Войти</button>

      <div class="divider">или</div>

      <button class="btn-google" type="button" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Войти через Google
      </button>

      <div class="auth-success" id="login-success"></div>
    </form>

    <!-- REGISTER FORM -->
    <form class="auth-form hidden" id="form-register" onsubmit="handleRegister(event)">
      <div class="auth-error" id="reg-error"></div>

      <div class="step-indicator">
        <div class="step-dot active" id="dot-0"></div>
        <div class="step-dot" id="dot-1"></div>
        <div class="step-dot" id="dot-2"></div>
      </div>

      <!-- Step 0: Account type -->
      <div id="reg-step-0">
        <div class="form-label" style="margin-bottom:12px; font-size:14px; color:#ccc;">Тип аккаунта</div>
        <div class="account-type-selector">
          <div class="type-card selected" id="type-personal" onclick="selectType('personal')">
            <div class="icon">👤</div>
            <div class="label">Частное лицо</div>
          </div>
          <div class="type-card" id="type-business" onclick="selectType('business')">
            <div class="icon">🏢</div>
            <div class="label">Организация / Клуб</div>
          </div>
        </div>
        <button class="btn-auth" type="button" onclick="nextStep(1)">Далее</button>
      </div>

      <!-- Step 1: Personal info -->
      <div id="reg-step-1" class="hidden">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Имя</label>
            <input class="form-input" type="text" id="reg-fname"
                   placeholder="Иван" autocomplete="given-name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Фамилия</label>
            <input class="form-input" type="text" id="reg-lname"
                   placeholder="Петров" autocomplete="family-name" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Город</label>
          <input class="form-input" type="text" id="reg-city"
                 placeholder="Москва" autocomplete="address-level2">
        </div>

        <div id="business-fields" class="hidden">
          <div class="form-group">
            <label class="form-label">Название организации / клуба</label>
            <input class="form-input" type="text" id="reg-org" placeholder="Moscow Kart Club">
          </div>
        </div>

        <div style="display:flex;gap:10px;">
          <button class="btn-auth" type="button"
                  style="background:#1a1a2e;color:#fff;flex:0 0 80px;"
                  onclick="prevStep(0)">←</button>
          <button class="btn-auth" type="button" style="flex:1" onclick="nextStep(2)">Далее</button>
        </div>
      </div>

      <!-- Step 2: Credentials -->
      <div id="reg-step-2" class="hidden">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="reg-email"
                 placeholder="your@email.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label class="form-label">Пароль</label>
          <div class="password-wrap">
            <input class="form-input" type="password" id="reg-password"
                   placeholder="Минимум 8 символов" autocomplete="new-password" required minlength="8">
            <span class="password-toggle" onclick="togglePwd('reg-password', this)">
              <i class="fa fa-eye"></i>
            </span>
          </div>
          <div class="form-hint">Минимум 8 символов</div>
        </div>

        <div class="form-group">
          <label class="form-label">Повтор пароля</label>
          <div class="password-wrap">
            <input class="form-input" type="password" id="reg-password2"
                   placeholder="••••••••" autocomplete="new-password">
            <span class="password-toggle" onclick="togglePwd('reg-password2', this)">
              <i class="fa fa-eye"></i>
            </span>
          </div>
        </div>

        <div style="display:flex;gap:10px;">
          <button class="btn-auth" type="button"
                  style="background:#1a1a2e;color:#fff;flex:0 0 80px;"
                  onclick="prevStep(1)">←</button>
          <button class="btn-auth" type="submit" id="btn-register" style="flex:1">
            Зарегистрироваться
          </button>
        </div>
      </div>

      <div class="auth-success" id="reg-success"></div>
    </form>
  </div>

  <script type="module">
    import { supabase } from '../js/supabase.js';

    // ── globals ───────────────────────────────────────────────────────────────
    let currentStep = 0;
    let accountType = 'personal';
    window.switchTab = switchTab;
    window.handleLogin = handleLogin;
    window.handleRegister = handleRegister;
    window.handleGoogle = handleGoogle;
    window.handleForgot = handleForgot;
    window.togglePwd = togglePwd;
    window.nextStep = nextStep;
    window.prevStep = prevStep;
    window.selectType = selectType;

    // Check already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/app/index.html';
    });

    function switchTab(tab) {
      document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    function selectType(type) {
      accountType = type;
      document.getElementById('type-personal').classList.toggle('selected', type === 'personal');
      document.getElementById('type-business').classList.toggle('selected', type === 'business');
      document.getElementById('business-fields').classList.toggle('hidden', type !== 'business');
    }

    function nextStep(step) {
      // validation for step 1
      if (step === 2) {
        const fn = document.getElementById('reg-fname').value.trim();
        const ln = document.getElementById('reg-lname').value.trim();
        if (!fn || !ln) { showRegError('Введите имя и фамилию'); return; }
        if (accountType === 'business' && !document.getElementById('reg-org').value.trim()) {
          showRegError('Введите название организации'); return;
        }
      }
      document.getElementById(`reg-step-${currentStep}`).classList.add('hidden');
      currentStep = step;
      document.getElementById(`reg-step-${currentStep}`).classList.remove('hidden');
      updateDots();
    }

    function prevStep(step) {
      document.getElementById(`reg-step-${currentStep}`).classList.add('hidden');
      currentStep = step;
      document.getElementById(`reg-step-${currentStep}`).classList.remove('hidden');
      updateDots();
    }

    function updateDots() {
      for (let i = 0; i < 3; i++) {
        const dot = document.getElementById(`dot-${i}`);
        dot.className = 'step-dot' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
      }
    }

    function togglePwd(id, el) {
      const inp = document.getElementById(id);
      const isText = inp.type === 'text';
      inp.type = isText ? 'password' : 'text';
      el.innerHTML = `<i class="fa fa-eye${isText ? '' : '-slash'}"></i>`;
    }

    function showLoginError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.classList.add('show');
    }

    function showRegError(msg) {
      const el = document.getElementById('reg-error');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('btn-login');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Входим...';
      document.getElementById('login-error').classList.remove('show');

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showLoginError(error.message === 'Invalid login credentials'
          ? 'Неверный email или пароль'
          : error.message);
        btn.disabled = false;
        btn.textContent = 'Войти';
        return;
      }

      btn.textContent = '✅ Вход выполнен!';
      setTimeout(() => { window.location.href = '/app/index.html'; }, 800);
    }

    async function handleRegister(e) {
      e.preventDefault();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;
      const fname    = document.getElementById('reg-fname').value.trim();
      const lname    = document.getElementById('reg-lname').value.trim();
      const city     = document.getElementById('reg-city').value.trim();
      const orgName  = document.getElementById('reg-org').value.trim();
      const btn      = document.getElementById('btn-register');

      document.getElementById('reg-error').classList.remove('show');

      if (password !== password2) { showRegError('Пароли не совпадают'); return; }
      if (password.length < 8)    { showRegError('Пароль слишком короткий'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Создаём аккаунт...';

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: {
            first_name: fname,
            last_name: lname,
            city: city || 'Москва',
            account_type: accountType,
            org_name: orgName || null,
          }
        }
      });

      if (error) {
        showRegError(error.message);
        btn.disabled = false;
        btn.textContent = 'Зарегистрироваться';
        return;
      }

      // Profile will be created by DB trigger
      // Show success
      document.getElementById('reg-step-2').classList.add('hidden');
      const succ = document.getElementById('reg-success');
      succ.innerHTML = `
        ✅ Аккаунт создан!<br><br>
        <span style="font-size:13px;color:#aaa;">
          Подтвердите email <b>${email}</b> — письмо уже отправлено.<br>
          После подтверждения вы войдёте автоматически.
        </span>
      `;
      succ.classList.add('show');
    }

    async function handleGoogle() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: `${window.location.origin}/app/index.html` }
      });
      if (error) showLoginError(error.message);
    }

    async function handleForgot() {
      const email = document.getElementById('login-email').value.trim();
      if (!email) { showLoginError('Введите email для сброса пароля'); return; }
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: `${window.location.origin}/app/auth.html`
      });
      if (!error) {
        document.getElementById('login-error').classList.remove('show');
        const succ = document.getElementById('login-success');
        succ.textContent = '📧 Письмо для сброса пароля отправлено!';
        succ.classList.add('show');
      }
    }
  </script>
</body>
</html>
